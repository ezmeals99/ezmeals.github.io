<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZ Meals</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
padding:20px;
position:relative;
}

header img{
width:220px;
}

.settings{
position:absolute;
right:20px;
top:20px;
font-size:25px;
cursor:pointer;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
width:220px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px 10px 0 0;
}

.card h3{
padding:10px;
}

.item{
background:white;
margin:10px auto;
padding:15px;
width:250px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

button{
padding:6px 12px;
font-size:16px;
cursor:pointer;
}

.order{
margin:30px;
padding:15px 30px;
font-size:18px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
}

.back{
margin:10px;
}

.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.admin-box{
background:white;
padding:30px;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<div class="settings" onclick="openAdmin()">⚙️</div>

<img src="logo.png">

</header>

<div id="packs" class="container">

<div class="card" onclick="openPack('fruits')">
<img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b">
<h3>Fruit Packs</h3>
</div>

<div class="card" onclick="openPack('soup')">
<img src="https://images.unsplash.com/photo-1547592166-23ac45744acd">
<h3>Soup Packs</h3>
</div>

<div class="card" onclick="openPack('curry')">
<img src="https://images.unsplash.com/photo-1604908176997-4310b9c84e13">
<h3>Curry Packs</h3>
</div>

</div>

<div id="items"></div>

<button class="order" onclick="order()">Order via WhatsApp</button>

<div id="adminLogin" class="admin">

<div class="admin-box">

<h3>Admin Login</h3>

<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</div>

</div>

<script>

let data={
fruits:["Mango","Apple","Banana"],
soup:["Potato","Beans"],
curry:["Chicken","Fish"]
}

let cart={}

function openPack(type){

document.getElementById("packs").style.display="none"

let html='<button class="back" onclick="location.reload()">⬅ Back</button>'

data[type].forEach(i=>{

cart[i]=0

html+=`
<div class="item">
<h3>${i}</h3>

<div class="qty">

<button onclick="change('${i}',-100)">-</button>

<span id="${i}">0 g</span>

<button onclick="change('${i}',100)">+</button>

</div>

</div>
`

})

document.getElementById("items").innerHTML=html

}

function change(name,val){

cart[name]+=val

if(cart[name]<0)cart[name]=0

document.getElementById(name).innerText=cart[name]+" g"

}

function order(){

let msg="Hello EZ Meals%0AOrder:%0A"

for(let i in cart){

if(cart[i]>0){

msg+=i+" "+cart[i]+"g%0A"

}

}

window.open("https://wa.me/94762522078?text="+msg)

}

function openAdmin(){

document.getElementById("adminLogin").style.display="flex"

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="ezmealadmin" && p==="9999"){

alert("Admin Logged In")

}else{

alert("Wrong Login")

}

}

</script>

</body>
</html>
